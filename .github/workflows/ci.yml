name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check markdown file structure
        run: |
          test -f README.md
          test -f PROPOSAL.md
          test -f ROADMAP.md
          test -f CHANGELOG.md
          test -f ARCHITECTURE.md
          test -f DECISIONS.md
          test -f DESIGN.md
          test -f SKILL.md
          test -f .claude-plugin/plugin.json
          test -d agents
      - name: Check byescaleira plugin manifest
        run: |
          test -f .claude-plugin/plugin.json
      - name: Check legacy extension files
        run: |
          test -f .claude/CLAUDE.md
          test -d .claude/commands
          test -d .claude/agents
          test -d .claude/rules
      - name: Validate Claude Code plugin manifest
        uses: anthropic/claude-code-action@latest
        with:
          command: plugin validate .
        continue-on-error: true
